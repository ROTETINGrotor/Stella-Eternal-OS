name: Build Stella App
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install PyInstaller
      run: pip install pyinstaller
    - name: Build
      run: pyinstaller --onefile stella.py
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: Stella-OS-Binary
        path: dist/
