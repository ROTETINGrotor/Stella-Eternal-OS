name: Build Stella
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install PyInstaller
      run: pip install pyinstaller
    - name: Build App
      run: pyinstaller --onefile stella.py
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Stella-App
        path: dist/
